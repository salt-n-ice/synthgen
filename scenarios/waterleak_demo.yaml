# scenarios/waterleak_demo.yaml
seed: 2027
start: 2026-02-01T00:00:00Z
duration: 60d

sensors:
  - id: leak_basement
    profile: water_leak
    capability: water
    unit: ""
    emit: { heartbeat: 2h }
  - id: leak_temperature
    profile: room_temperature
    capability: temperature
    unit: C
    emit: { delta_threshold: 0.3, heartbeat: 10min }
  - id: leak_battery
    profile: battery_drain
    capability: battery
    unit: "%"
    emit: { delta_threshold: 1.0, heartbeat: 6h }

anomalies:
  - { type: water_leak_sustained, sensor: leak_basement,   at: 2026-02-18T03:00:00Z, duration: 1h,  params: {} }
  - { type: unusual_occupancy,    sensor: leak_basement,   at: 2026-03-01T02:00:00Z, duration: 10min, params: { value: 1 } }
  - { type: spike,                sensor: leak_temperature,at: 2026-02-10T13:00:00Z, duration: 5min, params: { magnitude: 20 } }
  - { type: dip,                  sensor: leak_temperature,at: 2026-02-12T04:00:00Z, duration: 5min, params: { magnitude: 15 } }
  - { type: out_of_range,         sensor: leak_temperature,at: 2026-02-14T09:00:00Z, duration: 1min, params: { value: -999 } }
  - { type: calibration_drift,    sensor: leak_temperature,at: 2026-02-20T00:00:00Z, duration: 5d,  params: { bias: 3.0 } }
  - { type: trend,                sensor: leak_battery,    at: 2026-03-05T00:00:00Z, duration: 10d, params: { slope_per_sec: -5.0e-6 } }
  - { type: stuck_at,             sensor: leak_temperature,at: 2026-03-10T10:00:00Z, duration: 1h,  params: {} }
  - { type: dropout,              sensor: leak_basement,   at: 2026-03-15T12:00:00Z, duration: 4h,  params: {} }
  - { type: reporting_rate_change,sensor: leak_temperature,at: 2026-03-20T00:00:00Z, duration: 1d,  params: { keep_ratio: 0.1, seed: 5 } }
